<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blank Page</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: background-color 1.5s ease;
    background-color: #ffffff;
  }

  body.hide-cursor { cursor: none; }

  #help-box {
    background: rgba(0, 0, 0, 0.75);
    color: #f0f0f0;
    border-radius: 12px;
    padding: 28px 36px;
    max-width: 480px;
    width: 90%;
    opacity: 1;
    transition: opacity 2.5s ease;
    user-select: none;
    backdrop-filter: blur(4px);
  }

  #help-box.hidden {
    opacity: 0;
    pointer-events: none;
  }

  #help-box h2 {
    font-family: system-ui, sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    margin-bottom: 18px;
    color: #ffffff;
    text-transform: uppercase;
  }

  #help-box h3 {
    font-family: system-ui, sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #999;
    margin: 16px 0 8px;
  }

  .binding {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
    font-family: system-ui, sans-serif;
    font-size: 0.92rem;
  }

  kbd {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    padding: 3px 10px;
    font-family: monospace;
    font-size: 0.88rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  kbd:hover { background: rgba(255,255,255,0.3); }

  .desc {
    color: #cccccc;
    cursor: pointer;
  }

  .desc:hover { color: #ffffff; }

  .swatch-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 4px;
  }

  .swatch {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.25);
    transition: transform 0.12s, box-shadow 0.12s;
    flex-shrink: 0;
  }

  .swatch:hover {
    transform: scale(1.18);
    box-shadow: 0 0 0 2px rgba(255,255,255,0.6);
  }

  #color-input {
    width: 100%;
    margin-top: 16px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    padding: 7px 12px;
    color: #f0f0f0;
    font-family: monospace;
    font-size: 0.92rem;
    outline: none;
    transition: border-color 0.15s;
  }

  #color-input:focus { border-color: rgba(255,255,255,0.6); }
  #color-input.invalid { border-color: rgba(255,80,80,0.8); }

  #idle-note {
    margin-top: 16px;
    font-family: system-ui, sans-serif;
    font-size: 0.78rem;
    color: #777;
    text-align: center;
  }
</style>
</head>
<body>

<div id="help-box">
  <h2>Keybindings</h2>

  <div class="binding">
    <kbd data-action="fullscreen">F</kbd>
    <span class="desc" data-action="fullscreen">Toggle fullscreen</span>
  </div>
  <div class="binding">
    <kbd data-action="random">R</kbd>
    <span class="desc" data-action="random">Random background color</span>
  </div>
  <div class="binding">
    <kbd data-action="cycle">C</kbd>
    <span class="desc" data-action="cycle">Toggle color cycling</span>
  </div>
  <div class="binding">
    <kbd data-action="stop">Space</kbd>
    <span class="desc" data-action="stop">Stop color cycling</span>
  </div>
  <div class="binding">
    <kbd data-action="escape">Esc</kbd>
    <span class="desc" data-action="escape">Exit fullscreen</span>
  </div>

  <h3>Lighter presets</h3>
  <div id="presets-light" class="swatch-row"></div>

  <h3>Darker presets</h3>
  <div id="presets-dark" class="swatch-row"></div>

  <input id="color-input" type="text" placeholder="#ffffff" maxlength="7"
         spellcheck="false" autocomplete="off">

  <p id="idle-note">This box and the cursor will hide after a few seconds of inactivity.</p>
</div>

<script>
(function () {
  const helpBox   = document.getElementById('help-box');
  const colorInput = document.getElementById('color-input');
  const body      = document.body;

  // ── preset colors ───────────────────────────────────────────────────────────
  const LIGHTER_PRESETS = [
    { label: 'Full white',      hex: '#ffffff' },
    { label: 'Near white',      hex: '#f0ede8' },
    { label: 'Warm grey',       hex: '#c5bfb5' },
    { label: 'Cool grey',       hex: '#b5bbc5' },
    { label: 'Sage',            hex: '#b0bcb0' },
    { label: 'Dusty blue',      hex: '#a5b5c5' },
    { label: 'Dusty rose',      hex: '#c5aab0' },
    { label: 'Dusty lavender',  hex: '#b5aac5' },
  ];

  const DARKER_PRESETS = [
    { label: 'Full black',      hex: '#000000' },
    { label: 'Near black',      hex: '#1a1a1a' },
    { label: 'Dark warm',       hex: '#2a2622' },
    { label: 'Dark slate',      hex: '#24272e' },
    { label: 'Dark sage',       hex: '#1d251d' },
    { label: 'Dark navy',       hex: '#1d2935' },
    { label: 'Dark rose',       hex: '#2f1e21' },
    { label: 'Dark lavender',   hex: '#241c2c' },
  ];

  function buildSwatchRow(presets, id) {
    const container = document.getElementById(id);
    presets.forEach(preset => {
      const sw = document.createElement('div');
      sw.className = 'swatch';
      sw.style.background = preset.hex;
      sw.title = preset.label;
      sw.addEventListener('click', e => {
        e.stopPropagation();
        stopCycle();
        const hsl = hexToHsl(preset.hex);
        if (hsl) currentHsl = hsl;
        body.style.backgroundColor = preset.hex;
        setHexDisplay(preset.hex);
        showHelp();
      });
      container.appendChild(sw);
    });
  }

  buildSwatchRow(LIGHTER_PRESETS, 'presets-light');
  buildSwatchRow(DARKER_PRESETS,  'presets-dark');

  // ── idle / help-box timer ───────────────────────────────────────────────────
  let idleTimer = null;
  let mouseInBox = false;

  helpBox.addEventListener('mouseenter', () => {
    mouseInBox = true;
    clearTimeout(idleTimer);
  });

  helpBox.addEventListener('mouseleave', () => {
    mouseInBox = false;
    scheduleHide();
  });

  function scheduleHide() {
    clearTimeout(idleTimer);
    if (!mouseInBox) {
      idleTimer = setTimeout(() => helpBox.classList.add('hidden'), 5000);
    }
  }

  function showHelp() {
    helpBox.classList.remove('hidden');
    scheduleHide();
  }

  function isHelpVisible() {
    return !helpBox.classList.contains('hidden');
  }

  scheduleHide();

  // ── mouse-cursor hiding ─────────────────────────────────────────────────────
  let cursorTimer = null;

  function showCursor() {
    body.classList.remove('hide-cursor');
    clearTimeout(cursorTimer);
    if (!isHelpVisible()) scheduleCursorHide();
  }

  function scheduleCursorHide() {
    clearTimeout(cursorTimer);
    cursorTimer = setTimeout(() => body.classList.add('hide-cursor'), 5000);
  }

  document.addEventListener('mousemove', () => showCursor());

  new MutationObserver(() => {
    if (isHelpVisible()) {
      body.classList.remove('hide-cursor');
      clearTimeout(cursorTimer);
    } else {
      scheduleCursorHide();
    }
  }).observe(helpBox, { attributes: true, attributeFilter: ['class'] });

  // ── color helpers ───────────────────────────────────────────────────────────
  let currentHsl = { h: 0, s: 0, l: 100 };

  function hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const a = s * Math.min(l, 1 - l);
    const f = n => {
      const k = (n + h / 30) % 12;
      return l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1));
    };
    return '#' + [f(0), f(8), f(4)].map(v =>
      Math.round(v * 255).toString(16).padStart(2, '0')
    ).join('');
  }

  function hexToHsl(hex) {
    hex = hex.replace('#', '');
    if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
    if (hex.length !== 6 || !/^[0-9a-fA-F]{6}$/.test(hex)) return null;
    const r = parseInt(hex.slice(0, 2), 16) / 255;
    const g = parseInt(hex.slice(2, 4), 16) / 255;
    const b = parseInt(hex.slice(4, 6), 16) / 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    const l = (max + min) / 2;
    if (max === min) return { h: 0, s: 0, l: Math.round(l * 100) };
    const d = max - min;
    const s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    let h;
    if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
    else if (max === g) h = ((b - r) / d + 2) / 6;
    else h = ((r - g) / d + 4) / 6;
    return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
  }

  function setHexDisplay(hex) {
    if (document.activeElement !== colorInput) {
      colorInput.value = hex;
      colorInput.classList.remove('invalid');
    }
  }

  function applyBg() {
    const hex = hslToHex(currentHsl.h, currentHsl.s, currentHsl.l);
    body.style.backgroundColor = hex;
    setHexDisplay(hex);
  }

  // ── random color (fast transition) ──────────────────────────────────────────
  let randomTransitionTimer = null;

  function randomColor() {
    clearTimeout(randomTransitionTimer);
    body.style.transition = 'background-color 0.4s ease';
    currentHsl = { h: Math.random() * 360, s: 70, l: 55 };
    applyBg();
    randomTransitionTimer = setTimeout(() => { body.style.transition = ''; }, 500);
  }

  // ── color cycling ───────────────────────────────────────────────────────────
  let cycleRaf  = null;
  let lastTime  = null;
  let lightPhase = 0;          // radians; drives sinusoidal lightness
  const HUE_SPEED   = 20;      // degrees/second at peak
  const LIGHT_SPEED = 0.25;    // radians/second → full cycle ≈ 25 s

  function startCycle() {
    if (cycleRaf) { stopCycle(); return; }   // toggle off
    clearTimeout(randomTransitionTimer);
    // Ensure we have a hue and some saturation to work with
    if (currentHsl.s < 30) { currentHsl.s = 70; }
    // Seed lightPhase from current lightness so cycling starts seamlessly
    const lClamped = Math.max(5, Math.min(95, currentHsl.l));
    lightPhase = Math.asin((lClamped - 50) / 45);
    body.style.transition = 'none';
    lastTime = null;
    function tick(ts) {
      if (lastTime === null) lastTime = ts;
      const dt = (ts - lastTime) / 1000;
      lastTime = ts;
      // Advance lightness sinusoidally — sin naturally dwells at extremes
      lightPhase = (lightPhase + LIGHT_SPEED * dt) % (2 * Math.PI);
      currentHsl.l = 50 + 45 * Math.sin(lightPhase);
      // Slow hue near dark/light extremes so indistinguishable near-blacks
      // and near-whites don't race through hues invisibly
      const hueFactor = 0.1 + 0.9 * Math.abs(Math.cos(lightPhase));
      currentHsl.h = (currentHsl.h + HUE_SPEED * hueFactor * dt) % 360;
      applyBg();
      cycleRaf = requestAnimationFrame(tick);
    }
    cycleRaf = requestAnimationFrame(tick);
  }

  function stopCycle() {
    if (!cycleRaf) return;
    cancelAnimationFrame(cycleRaf);
    cycleRaf = null;
    // Lock the current color immediately with no transition, then restore it
    const locked = hslToHex(currentHsl.h, currentHsl.s, currentHsl.l);
    body.style.transition = 'none';
    body.style.backgroundColor = locked;
    setHexDisplay(locked);
    requestAnimationFrame(() => { body.style.transition = ''; });
  }

  // ── fullscreen ──────────────────────────────────────────────────────────────
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  }

  function exitFullscreen() {
    if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
  }

  // ── action dispatch ─────────────────────────────────────────────────────────
  function dispatch(action) {
    switch (action) {
      case 'fullscreen': toggleFullscreen(); break;
      case 'random':    stopCycle(); randomColor(); break;
      case 'cycle':     startCycle(); break;
      case 'stop':      stopCycle(); break;
      case 'escape':    exitFullscreen(); break;
    }
  }

  // ── keyboard ────────────────────────────────────────────────────────────────
  const KEY_MAP = {
    'f': 'fullscreen', 'F': 'fullscreen',
    'r': 'random',     'R': 'random',
    'c': 'cycle',      'C': 'cycle',
    ' ': 'stop',
    'Escape': 'escape',
  };

  document.addEventListener('keydown', e => {
    if (document.activeElement === colorInput) return;
    const action = KEY_MAP[e.key];
    if (action) dispatch(action);
    showHelp();
  });

  // ── mouse clicks ────────────────────────────────────────────────────────────
  document.addEventListener('click', e => {
    const t = e.target;
    if (!t.closest('kbd') && !t.closest('.swatch') && !t.closest('.desc') && t !== colorInput) {
      showHelp();
    }
  });

  document.querySelectorAll('kbd[data-action], .desc[data-action]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      dispatch(el.dataset.action);
      showHelp();
    });
  });

  // ── hex color input ─────────────────────────────────────────────────────────
  colorInput.addEventListener('keydown', e => e.stopPropagation());
  colorInput.addEventListener('click',   e => e.stopPropagation());

  colorInput.addEventListener('input', () => {
    let val = colorInput.value.trim();
    if (val && !val.startsWith('#')) val = '#' + val;
    const ok = /^#[0-9a-fA-F]{6}$/.test(val) || /^#[0-9a-fA-F]{3}$/.test(val);
    if (ok) {
      colorInput.classList.remove('invalid');
      stopCycle();
      const hsl = hexToHsl(val);
      if (hsl) currentHsl = hsl;
      body.style.transition = 'none';
      body.style.backgroundColor = val;
    } else {
      colorInput.classList.toggle('invalid', colorInput.value.length > 1);
    }
  });

  colorInput.addEventListener('blur', () => {
    colorInput.classList.remove('invalid');
    colorInput.value = hslToHex(currentHsl.h, currentHsl.s, currentHsl.l);
  });

  // Initialize hex display
  colorInput.value = '#ffffff';
})();
</script>
</body>
</html>
